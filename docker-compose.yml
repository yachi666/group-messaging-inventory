services:
  gmi-postgres:
    image: postgres:16-alpine
    container_name: gmi-postgres
    environment:
      POSTGRES_DB: gmi
      POSTGRES_USER: gmi
      POSTGRES_PASSWORD: gmi
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gmi -d gmi']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - gmi_postgres_data:/var/lib/postgresql/data

  temporal-postgres:
    image: postgres:16-alpine
    container_name: gmi-temporal-postgres
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U temporal -d temporal']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - gmi_temporal_postgres_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.26
    container_name: gmi-temporal-server
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    ports:
      - '7233:7233'
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro

  temporal-ui:
    image: temporalio/ui:2.36.0
    container_name: gmi-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - '8233:8080'

  gmi-db-migrate:
    profiles:
      - app
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gmi-db-migrate
    depends_on:
      gmi-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://gmi:gmi@gmi-postgres:5432/gmi
    command: ['npm', 'run', 'migrate:prod', '-w', '@gmi/db']

  gmi-api:
    profiles:
      - app
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gmi-api
    depends_on:
      gmi-db-migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
    environment:
      PORT: 4000
      DATABASE_URL: postgres://gmi:gmi@gmi-postgres:5432/gmi
      ANALYSIS_WORKFLOW_DRIVER: temporal
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: template-analysis
      AI_PROVIDER: noop
      AI_PROVIDER_READINESS_MODE: config
      API_AUTH_MODE: header
    ports:
      - '4000:4000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  gmi-worker:
    profiles:
      - app
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: gmi-worker
    depends_on:
      gmi-postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgres://gmi:gmi@gmi-postgres:5432/gmi
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: template-analysis
      AI_PROVIDER: noop
      AI_PROVIDER_READINESS_MODE: config

  gmi-web:
    profiles:
      - app
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:4000
    container_name: gmi-web
    depends_on:
      gmi-api:
        condition: service_healthy
    ports:
      - '5080:80'

volumes:
  gmi_postgres_data:
  gmi_temporal_postgres_data:
