name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, Build, and Harness Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run no-infrastructure harness gates
        run: npm run test:no-infra
