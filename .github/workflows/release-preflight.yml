name: Release Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-preflight:
    name: Docker-backed Release Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Docker-backed release preflight
        run: npm run test:release-preflight:local
